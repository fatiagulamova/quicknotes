{% extends "base.html" %}

{% block title %}New Note – QuickNotes{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('notes.index') }}">Notes</a></li>
        <li class="breadcrumb-item active" aria-current="page">New Note</li>
      </ol>
    </nav>

    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h1 class="h5 mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>New Note</h1>
      </div>
      <div class="card-body">
        <form method="post" action="{{ url_for('notes.new_note') }}" novalidate>
          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              class="form-control"
              placeholder="Enter a title…"
              value="{{ title }}"
              maxlength="255"
              required
            />
          </div>
          <div class="mb-3">
            <label for="content" class="form-label fw-semibold">Content</label>
            <textarea
              id="content"
              name="content"
              class="form-control"
              rows="8"
              placeholder="Write your note here…"
              required
            >{{ content }}</textarea>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <a href="{{ url_for('notes.index') }}" class="btn btn-outline-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>Save Note
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
