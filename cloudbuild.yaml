steps:
  # 1. Adım: Yeni Docker imajını build et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/quicknotes-app:$COMMIT_SHA', '.']

  # 2. Adım: İmajı Google Cloud'a (GCR) push et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/quicknotes-app:$COMMIT_SHA']

  # 3. Adım: Kubernetes'e yeni imajı kullanması için emir ver
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/quicknotes-deployment'
      - 'quicknotes-app=gcr.io/$PROJECT_ID/quicknotes-app:$COMMIT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west3-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=quicknotes-cluster'